<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل معامل التحاليل في مصر</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f8fb;
color:#222;
}

header{
background:#0b7dda;
color:white;
padding:25px;
text-align:center;
}

header h1{
margin:0;
font-size:28px;
}

.search{
padding:20px;
text-align:center;
}

input{
width:90%;
max-width:500px;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
}

.container{
width:90%;
max-width:900px;
margin:auto;
}

.card{
background:white;
margin:20px 0;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h2{
margin-top:0;
color:#0b7dda;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#0b7dda;
color:white;
text-decoration:none;
border-radius:8px;
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
background:#0b7dda;
color:white;
}
</style>

</head>

<body>

<header>
<h1>🏥 دليل معامل التحاليل في مصر</h1>
<p>ابحث عن أفضل معامل التحاليل</p>
</header>

<div class="search">
<input type="text" placeholder="ابحث عن معمل...">
</div>

<div class="container">

<div class="card">
<h2>البرج</h2>
<p>أحد أكبر معامل التحاليل الطبية في مصر.</p>
</div>

<div class="card">
<h2>المختبر</h2>
<p>خدمات تحاليل طبية متكاملة.</p>
</div>

<div class="card">
<h2>ألفا</h2>
<p>تحاليل دقيقة وخدمات سحب منزلي.</p>
</div>

<div class="card">
<h2>ذا لاب</h2>
<p>تقنيات حديثة ونتائج إلكترونية.</p>
</div>

<div class="card">
<h2>تاون لاب</h2>
<p>خدمات تحاليل متنوعة وفروع متعددة.</p>
</div>

</div>

<footer>
A Project by Tamer Amin
</footer>

</body>
</html>
