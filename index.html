<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معامل مصر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: auto; }
        .lab-box { background: white; margin-bottom: 10px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lab-header { width: 100%; padding: 15px; background: white; border: none; text-align: right; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .lab-content { padding: 15px; display: none; background: #fafafa; border-top: 1px solid #ddd; }
        .btn { display: block; width: 100%; margin-top: 10px; padding: 12px; text-decoration: none; border-radius: 5px; font-size: 16px; font-weight: bold; text-align: center; }
        .call-btn { background-color: #004a99; color: white; }
        .map-btn { background-color: #28a745; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>دليل المعامل 🏥</h2>
    
    <!-- البرج -->
    <div class="lab-box">
        <button class="lab-header" onclick="toggleLab(this)">
            <div>🔬 البرج</div>
            <span>▼</span>
        </button>
        <div class="lab-content">
            <a href="tel:19911" class="btn call-btn">اتصل بالخط الساخن: 19911 📞</a>
            <a href="https://www.google.com/maps/search/Al+Borg+Lab+branches+Egypt" class="btn map-btn" target="_blank">الفروع على الخريطة 📍</a>
        </div>
    </div>

    <!-- المختبر -->
    <div class="lab-box">
        <button class="lab-header" onclick="toggleLab(this)">
            <div>🧪 المختبر</div>
            <span>▼</span>
        </button>
        <div class="lab-content">
            <a href="tel:19014" class="btn call-btn">اتصل بالخط الساخن: 19014 📞</a>
            <a href="https://www.google.com/maps/search/Almokhtabar+Lab+branches+Egypt" class="btn map-btn" target="_blank">الفروع على الخريطة 📍</a>
        </div>
    </div>

    <!-- ألفا -->
    <div class="lab-box">
        <button class="lab-header" onclick="toggleLab(this)">
            <div>🧬 ألفا</div>
            <span>▼</span>
        </button>
        <div class="lab-content">
            <a href="tel:16191" class="btn call-btn">اتصل بالخط الساخن: 16191 📞</a>
            <a href="https://www.google.com/maps/search/Alfa+Lab+branches+Egypt" class="btn map-btn" target="_blank">الفروع على الخريطة 📍</a>
        </div>
    </div>

    <!-- تاون لاب -->
    <div class="lab-box">
        <button class="lab-header" onclick="toggleLab(this)">
            <div>💊 تاون لاب</div>
            <span>▼</span>
        </button>
        <div class="lab-content">
            <a href="tel:15767" class="btn call-btn">اتصل بالخط الساخن: 15767 📞</a>
            <a href="https://www.google.com/maps/search/Town+Lab+branches+Egypt" class="btn map-btn" target="_blank">الفروع على الخريطة 📍</a>
        </div>
    </div>

    <!-- ذا لاب -->
    <div class="lab-box">
        <button class="lab-header" onclick="toggleLab(this)">
            <div>🩺 ذا لاب</div>
            <span>▼</span>
        </button>
        <div class="lab-content">
            <a href="tel:16458" class="btn call-btn">اتصل بالخط الساخن: 16458 📞</a>
            <a href="https://www.google.com/maps/search/The+Lab+Egypt+branches" class="btn map-btn" target="_blank">الفروع على الخريطة 📍</a>
        </div>
    </div>

</div>

<script>
    function toggleLab(btn) {
        var content = btn.nextElementSibling;
        content.style.display = (content.style.display === "block") ? "none" : "block";
    }
</script>

</body>
</html>
